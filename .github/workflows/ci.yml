name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint source
        run: bun run lint:source

      - name: Check formatting
        run: bun run format:check

      - name: Typecheck TypeScript and browser runtime
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test:unit

      - name: Inspect package contents
        run: bun pm pack --dry-run

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Build site
        run: bun run build -- --vault ./test-vault --out ./dist

      - name: Enforce generated asset size budgets
        run: bun run check:size

      - name: Verify reproducible no-op builds
        run: bun run check:reproducible

      - name: Validate production site
        id: production-validation
        run: bun run validate:production -- --config ./tests/fixtures/production-site/blog.config.ts --out ./.tmp/production-dist --report-dir ./.tmp/production-report

      - name: Upload production validation report on failure
        if: failure() && steps.production-validation.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: production-validation-report
          path: .tmp/production-report/**
          if-no-files-found: error
          retention-days: 7

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/**
            playwright-report/**
          if-no-files-found: ignore
          retention-days: 7
